<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="NexusHub – A channel-based collaboration platform for teams, academic groups, and organizations." />
  <title>NexusHub – Collaborate Better</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/design.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>

<body>
  <div class="background-glow">
    <div class="glow-blob blob-1"></div>
    <div class="glow-blob blob-2"></div>
    <div class="glow-blob blob-3"></div>
  </div>
  <input type="file" id="avatar-input" class="hidden" accept="image/*" onchange="Profile.handleFileSelect(event)">
  <div id="app">
    <!-- Router will inject views here -->
  </div>

  <!-- Global Modal Overlay -->
  <div id="modal-overlay" class="modal-overlay hidden"></div>

  <!-- Notification Toast -->

  <!-- Supabase Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js?v=2"></script>

  <script src="js/store.js?v=2"></script>
  <script src="js/auth.js?v=2"></script>
  <script src="js/notifications.js?v=2"></script>
  <script src="js/messages.js?v=2"></script>
  <script src="js/tasks.js?v=2"></script>
  <script src="js/channels.js?v=2"></script>
  <script src="js/spaces.js?v=2"></script>
  <script src="js/profile.js?v=2"></script>
  <script src="js/app.js?v=2"></script>
</body>

</html>
